services:
  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: rabbit-server
    ports:
      - "${RABBITMQ_PORT}:${RABBITMQ_PORT}"   # RabbitMQ communication port
      - "${RABBITMQ_UI_PORT}:${RABBITMQ_UI_PORT}" # Management UI (Username/Pass: guest/guest)
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: redis-server
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  recommendation_service:
    build: ./recommendation-service
    container_name: python_worker
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_MODEL_NAME=gemini-2.5-flash
      - QUEUE_NAME=${QUEUE_NAME}
    restart: always

  ai-consult-service:
    build: ./ai-consult-service
    container_name: ai_consult_worker
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=${REDIS_URL}
      - REDIS_PORT=${REDIS_PORT}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - AI_MODEL_NAME=gemini-2.5-flash
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CONSULTER_RESPONSE_QUEUE=${CONSULTER_RESPONSE_QUEUE}
    restart: always