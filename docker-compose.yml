services:
  db:
    image: postgres:16-alpine
    container_name: iaas-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-iaas_db}
    ports:
      - "5432:5432"
    volumes:
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    networks:
      - iaas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-iaas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: iaas-api
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-iaas_db}
      DB_HOST: db:5432
    ports:
      - "8080:8080"
    volumes:
      - ./backend/api/config.json:/app/config.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - iaas-network
    restart: unless-stopped

networks:
  iaas-network:
    driver: bridge

volumes:
  postgres-data:

