services:
  db:
    image: postgres:16-alpine
    container_name: iaas-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-iaas_db}
    ports:
      - "5432:5432"
    volumes:
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    networks:
      - iaas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-iaas_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    container_name: iaas-api
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-iaas_db}
      DB_HOST: db:5432
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      # Set DEV_NODE_ENABLED=true to start a mock LXD node for development/testing.
      # Remove or set to false in production.
      DEV_NODE_ENABLED: ${DEV_NODE_ENABLED:-false}
      DEV_NODE_ADDR: ${DEV_NODE_ADDR:-localhost:50051}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8080:8080"
    volumes:
      - ./backend/api/config.json:/app/config.json:ro
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - iaas-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: rabbit-server
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"   # RabbitMQ communication port
      - "${RABBITMQ_UI_PORT:-15672}:15672" # Management UI (Username/Pass: guest/guest)
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - iaas-network
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: redis-server
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - iaas-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  recommendation_service:
    extra_hosts:
      - "generativelanguage.googleapis.com:142.250.201.170"
    build: ./recommendation-service
    container_name: python_worker
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AI_MODEL_NAME=gemini-2.5-flash
      - QUEUE_NAME=${QUEUE_NAME:-hardware_requests}
    networks:
      - iaas-network
    restart: always

  ai-consult-service:
    extra_hosts:
      - "generativelanguage.googleapis.com:142.250.201.170"
    build: ./ai-consult-service
    container_name: ai_consult_worker
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - AI_MODEL_NAME=gemini-2.5-flash
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CONSULTER_RESPONSE_QUEUE=${CONSULTER_RESPONSE_QUEUE:-chat_requests}
    networks:
      - iaas-network
    restart: always

  frontend:
    build: ./frontend
    container_name: iaas-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - iaas-network
    restart: unless-stopped

networks:
  iaas-network:
    driver: bridge

volumes:
  postgres-data:

